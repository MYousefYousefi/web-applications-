<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task List App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" >
</head>
<body class="p-4">
    <div class="container">
        <h2 class="mb-4">Task List</h2>

        <!-- Task Input Form -->
         <from method="POST" class="mb-4">
            <div class="mb-2">
                <input type="text" name="title" placeholder="Title" class="form-control" required>
            </div>
            <div class="mb-2">
                <input type="text" name="description" placeholder="Description" class="form-control" >
            </div>
            <div class="mb-2">
                <select name="status" class="form-select">
                    <option value="Pending">Pending</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Add Task</button>
        </from>
        <!-- Excel file import -->
         <form method="POST" action="/import_excel" enctype="multipart/form-data" class="mb-3">
            <input type="file" name="file" accept=".xlsx, .xls" required>
            <button type="submit" class="btn btn-info">Import Excel</button>
         </form>

         <!-- JSON download button-->
          <a href="/download_json" class="btn btn-success mb-3">Download as JSON</a>

        <!-- Task List Table -->
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                {% for task in tasks %}
                <tr>
                    <form method="POST" action="/edit/{{ loop.index0 }}">
                        <td><input type="text" name="title" value="{{ task.title }}" class="form-control"></td>
                        <td><input type="text" name="description" value="{{ task.description }}" class="form-control"></td>
                        <td>
                            <select name="status" class="form-select">
                                <option value="Pending" {% if task.status == 'Pending' %}selected{% endif %}>Pending</option>
                                <option value="Completed" {% if task.status == 'Completed' %}selected{% endif %}>Completed</option>
                            </select>
                        </td>
                        <td>
                        <!-- Edit and Delete buttons -->
                        <button type="submit" class="btn btn-sm btn-warning">Update</button>
                        <a href="/delete/{{ task.id }}" class="btn btn-sm btn-danger">Delete</a>
                        </td>
                    </form>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    
</body>
</html>
