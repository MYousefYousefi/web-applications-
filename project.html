{%% extends "base.html" %}

{% block content %}
<h2>My Projects</h2>

{% for project in projects %}
<div class="project">
    <h3>{{ project.name }}</h3>
    <p>{{ project.description }}</p>
    {% if project.link %}
    <a href="{{ project.github }}" target="_blank">https://github.com/MYousefYousefi</a>
    {% endif %}
</div>
{% endfor %}
{% endblock %}
